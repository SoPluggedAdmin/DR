# =============================================================
# DataRegimen — nginx main config (Cloud Run friendly)
# Runs as the non-root `nginx` user. PID + temp files under /tmp.
# =============================================================

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # MIME
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths writable by non-root
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Access logs to stdout (Cloud Logging picks them up)
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time'
      '}';
    access_log /dev/stdout json_combined;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Map response Content-Type to a sensible Cache-Control value.
    # Defined at http level so the server block uses one add_header
    # (avoids nginx's "child add_header overrides parent" pitfall).
    map $sent_http_content_type $cache_control {
        default                            "public, max-age=300, must-revalidate";
        ~*text/html                        "public, max-age=300, must-revalidate";
        ~*text/css                         "public, max-age=2592000, must-revalidate";
        ~*application/javascript           "public, max-age=2592000, must-revalidate";
        ~*application/json                 "public, max-age=300, must-revalidate";
        ~*application/manifest\+json       "public, max-age=3600";
        ~*application/xml                  "public, max-age=3600";
        ~*image/                           "public, max-age=2592000, must-revalidate";
        ~*font/                            "public, max-age=2592000, immutable";
        ~*application/font                 "public, max-age=2592000, immutable";
    }

    # Limits
    client_max_body_size 1m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    include /etc/nginx/conf.d/*.conf;
}
