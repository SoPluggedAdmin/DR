<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Page not found — DataRegimen</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&amp;family=IBM+Plex+Sans:wght@400;500&amp;family=IBM+Plex+Mono:wght@400&amp;display=swap" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .nf {
      min-height: 80vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4rem var(--gutter);
    }
    .nf-code {
      font-family: var(--mono);
      font-size: .85rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .nf h1 { font-size: clamp(3rem, 8vw, 6rem); margin-bottom: 1rem; }
    .nf p { max-width: 40ch; margin: 0 auto 2rem; color: var(--muted); font-size: 1.1rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="/" aria-label="DataRegimen home">
        <svg class="brand-mark" width="28" height="28" viewBox="0 0 32 32" aria-hidden="true">
          <rect x="2" y="2" width="28" height="28" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <line x1="2" y1="11" x2="30" y2="11" stroke="currentColor" stroke-width="1.5"/>
          <line x1="2" y1="21" x2="30" y2="21" stroke="currentColor" stroke-width="1.5"/>
          <line x1="11" y1="2" x2="11" y2="30" stroke="currentColor" stroke-width="1.5"/>
          <line x1="21" y1="2" x2="21" y2="30" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="3" fill="currentColor"/>
        </svg>
        <span class="brand-name">Data<em>Regimen</em></span>
      </a>
    </div>
  </header>

  <main>
    <div class="nf">
      <div>
        <p class="nf-code">404 — Not found</p>
        <h1>This page wandered off.</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back to disciplined data.</p>
        <a class="btn btn-primary" href="/">Return home</a>
      </div>
    </div>
  </main>
</body>
</html>
